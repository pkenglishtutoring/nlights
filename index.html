<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Aurora – OBS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020218;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <canvas id="auroraCanvas"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('auroraCanvas');
            const ctx = canvas.getContext('2d');

            const WIDTH = 1920;
            const HEIGHT = 1080;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;

            let time = 0;

            // ---- HORIZONTAL AURORA BANDS ----
            const bands = [];
            const BAND_COUNT = 12;              // plenty to cover the screen vertically

            function createBand(index) {
                // spread bands across the height with some overlap
                const bandHeight = HEIGHT / BAND_COUNT;
                const baseY = (index + 0.5) * bandHeight + (Math.random() - 0.5) * bandHeight * 0.5;
                // vertical thickness (width in horizontal context)
                const thickness = bandHeight * (1.0 + Math.random() * 1.4); // "a bit wider"

                return {
                    baseY: baseY,
                    thickness: thickness,
                    amplitude: 20 + Math.random() * 60,         // gentle vertical wobble
                    frequency: 0.0006 + Math.random() * 0.002,
                    speed: 0.01 + Math.random() * 0.03,         // slow horizontal drift
                    phase: Math.random() * Math.PI * 2,
                    // gradient from top (blue) to bottom (red) within each band
                    colorStops: [
                        { pos: 0, color: 'rgba(30, 60, 160, 0.18)' },
                        { pos: 0.35, color: 'rgba(80, 40, 150, 0.16)' },
                        { pos: 0.65, color: 'rgba(180, 40, 100, 0.14)' },
                        { pos: 0.85, color: 'rgba(220, 60, 50, 0.10)' },
                        { pos: 1, color: 'rgba(200, 40, 30, 0.04)' }
                    ]
                };
            }

            for (let i = 0; i < BAND_COUNT; i++) {
                bands.push(createBand(i));
            }

            // ---- STARS ----
            const stars = [];
            const STAR_COUNT = 250;
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * WIDTH,
                    y: Math.random() * HEIGHT * 0.8,
                    radius: 0.3 + Math.random() * 1.8,
                    twinkleSpeed: 0.5 + Math.random() * 2.5,
                    phase: Math.random() * Math.PI * 2,
                    baseOpacity: 0.3 + Math.random() * 0.7
                });
            }

            // ---- DRAW BACKGROUND ----
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
                grad.addColorStop(0, '#03031a');
                grad.addColorStop(0.5, '#0a0a2a');
                grad.addColorStop(1, '#020212');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
            }

            // ---- DRAW STARS ----
            function drawStars(t) {
                for (const s of stars) {
                    const opacity = s.baseOpacity * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.phase));
                    ctx.fillStyle = `rgba(220,230,255,${opacity.toFixed(2)})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ---- DRAW HORIZONTAL AURORA BANDS ----
            function drawBands(t) {
                for (const b of bands) {
                    const steps = 160;          // high resolution for smooth waves
                    const dx = WIDTH / steps;

                    // upper and lower edges of the band, following a wavy pattern
                    const upperPoints = [];
                    const lowerPoints = [];
                    for (let i = 0; i <= steps; i++) {
                        const x = i * dx;
                        // vertical offset based on horizontal position and time
                        const waveOffset = b.amplitude * Math.sin(x * b.frequency + b.phase + t * b.speed);
                        const yTop = b.baseY - b.thickness / 2 + waveOffset;
                        const yBottom = b.baseY + b.thickness / 2 + waveOffset * 0.7; // slightly different wave for thickness variation
                        upperPoints.push({ x, y: yTop });
                        lowerPoints.push({ x, y: yBottom });
                    }

                    ctx.beginPath();
                    // trace upper edge left to right
                    ctx.moveTo(upperPoints[0].x, upperPoints[0].y);
                    for (let i = 1; i < upperPoints.length; i++) {
                        ctx.lineTo(upperPoints[i].x, upperPoints[i].y);
                    }
                    // trace lower edge right to left
                    for (let i = lowerPoints.length - 1; i >= 0; i--) {
                        ctx.lineTo(lowerPoints[i].x, lowerPoints[i].y);
                    }
                    ctx.closePath();

                    // vertical gradient across the band (top to bottom)
                    const yMin = b.baseY - b.thickness;
                    const yMax = b.baseY + b.thickness;
                    const grad = ctx.createLinearGradient(0, yMin, 0, yMax);
                    for (const stop of b.colorStops) {
                        grad.addColorStop(stop.pos, stop.color);
                    }
                    ctx.fillStyle = grad;
                    ctx.fill();

                    // very faint edge
                    ctx.strokeStyle = 'rgba(180, 150, 255, 0.05)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }

            // ---- VIGNETTE ----
            function drawVignette() {
                const vignette = ctx.createRadialGradient(WIDTH*0.5, HEIGHT*0.5, WIDTH*0.45, WIDTH*0.5, HEIGHT*0.5, WIDTH*0.8);
                vignette.addColorStop(0, 'rgba(0,0,0,0)');
                vignette.addColorStop(0.7, 'rgba(0,0,0,0)');
                vignette.addColorStop(1, 'rgba(2,2,10,0.6)');
                ctx.fillStyle = vignette;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
            }

            // ---- MAIN LOOP ----
            function animate(ts) {
                const dt = Math.min(0.05, (ts - (animate.lastTs || ts)) / 1000);
                animate.lastTs = ts;
                time += dt;

                ctx.clearRect(0, 0, WIDTH, HEIGHT);
                drawBackground();
                drawStars(time);
                drawBands(time);
                drawVignette();

                requestAnimationFrame(animate);
            }
            animate.lastTs = performance.now();
            requestAnimationFrame(animate);

            function handleResize() {
                const containerAspect = window.innerWidth / window.innerHeight;
                const aspectRatio = WIDTH / HEIGHT;
                if (containerAspect > aspectRatio) {
                    canvas.style.width = 'auto';
                    canvas.style.height = '100%';
                } else {
                    canvas.style.width = '100%';
                    canvas.style.height = 'auto';
                }
            }
            window.addEventListener('resize', handleResize);
            handleResize();

            console.log('🌌 Horizontal Aurora – 1920×1080 – OBS Ready');
        })();
    </script>
</body>
</html>
