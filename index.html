<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Lights – No Bars · OBS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020218;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <canvas id="auroraCanvas"></canvas>
    <script>
        (function() {
            const canvas = document.getElementById('auroraCanvas');
            const ctx = canvas.getContext('2d');

            const WIDTH = 1920;
            const HEIGHT = 1080;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;

            let time = 0;

            // ---- AURORA CURTAINS (translucent, slow movement) ----
            const curtains = [];
            const CURTAIN_COUNT = 6;

            function createCurtain() {
                return {
                    baseX: 200 + Math.random() * (WIDTH - 400),
                    width: 80 + Math.random() * 160,
                    amplitude: 40 + Math.random() * 80,
                    frequency: 0.001 + Math.random() * 0.003,
                    speed: 0.015 + Math.random() * 0.04,
                    phase: Math.random() * Math.PI * 2,
                    colorStops: [
                        { pos: 0, color: 'rgba(30, 60, 160, 0.18)' },
                        { pos: 0.35, color: 'rgba(80, 40, 150, 0.16)' },
                        { pos: 0.65, color: 'rgba(180, 40, 100, 0.14)' },
                        { pos: 0.85, color: 'rgba(220, 60, 50, 0.10)' },
                        { pos: 1, color: 'rgba(200, 40, 30, 0.04)' }
                    ]
                };
            }

            for (let i = 0; i < CURTAIN_COUNT; i++) {
                curtains.push(createCurtain());
            }

            // ---- STARS ----
            const stars = [];
            const STAR_COUNT = 250;
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * WIDTH,
                    y: Math.random() * HEIGHT * 0.8,
                    radius: 0.3 + Math.random() * 1.8,
                    twinkleSpeed: 0.5 + Math.random() * 2.5,
                    phase: Math.random() * Math.PI * 2,
                    baseOpacity: 0.3 + Math.random() * 0.7
                });
            }

            // ---- DRAW BACKGROUND ----
            function drawBackground() {
                const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
                grad.addColorStop(0, '#03031a');
                grad.addColorStop(0.5, '#0a0a2a');
                grad.addColorStop(1, '#020212');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
            }

            // ---- DRAW STARS ----
            function drawStars(t) {
                for (const s of stars) {
                    const opacity = s.baseOpacity * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.phase));
                    ctx.fillStyle = `rgba(220,230,255,${opacity.toFixed(2)})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ---- DRAW AURORA CURTAINS ----
            function drawCurtains(t) {
                for (const c of curtains) {
                    const steps = 80;
                    const topY = 0;
                    const bottomY = HEIGHT;
                    const dy = (bottomY - topY) / steps;

                    const leftPoints = [];
                    const rightPoints = [];
                    for (let i = 0; i <= steps; i++) {
                        const y = topY + i * dy;
                        const waveOffset = c.amplitude * Math.sin(y * c.frequency + c.phase + t * c.speed);
                        const leftX = c.baseX - c.width / 2 + waveOffset;
                        const rightX = c.baseX + c.width / 2 + waveOffset * 0.8;
                        leftPoints.push({ x: leftX, y });
                        rightPoints.push({ x: rightX, y });
                    }

                    ctx.beginPath();
                    ctx.moveTo(leftPoints[0].x, leftPoints[0].y);
                    for (let i = 1; i < leftPoints.length; i++) {
                        ctx.lineTo(leftPoints[i].x, leftPoints[i].y);
                    }
                    for (let i = rightPoints.length - 1; i >= 0; i--) {
                        ctx.lineTo(rightPoints[i].x, rightPoints[i].y);
                    }
                    ctx.closePath();

                    const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
                    for (const stop of c.colorStops) {
                        grad.addColorStop(stop.pos, stop.color);
                    }
                    ctx.fillStyle = grad;
                    ctx.fill();

                    // subtle edge glow
                    ctx.strokeStyle = 'rgba(180, 150, 255, 0.08)';
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                }
            }

            // ---- VIGNETTE ----
            function drawVignette() {
                const vignette = ctx.createRadialGradient(WIDTH*0.5, HEIGHT*0.5, WIDTH*0.45, WIDTH*0.5, HEIGHT*0.5, WIDTH*0.8);
                vignette.addColorStop(0, 'rgba(0,0,0,0)');
                vignette.addColorStop(0.7, 'rgba(0,0,0,0)');
                vignette.addColorStop(1, 'rgba(2,2,10,0.6)');
                ctx.fillStyle = vignette;
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
            }

            // ---- MAIN LOOP ----
            function animate(ts) {
                const dt = Math.min(0.05, (ts - (animate.lastTs || ts)) / 1000);
                animate.lastTs = ts;
                time += dt;

                ctx.clearRect(0, 0, WIDTH, HEIGHT);
                drawBackground();
                drawStars(time);
                drawCurtains(time);
                drawVignette();

                requestAnimationFrame(animate);
            }
            animate.lastTs = performance.now();
            requestAnimationFrame(animate);

            function handleResize() {
                const containerAspect = window.innerWidth / window.innerHeight;
                const aspectRatio = WIDTH / HEIGHT;
                if (containerAspect > aspectRatio) {
                    canvas.style.width = 'auto';
                    canvas.style.height = '100%';
                } else {
                    canvas.style.width = '100%';
                    canvas.style.height = 'auto';
                }
            }
            window.addEventListener('resize', handleResize);
            handleResize();

            console.log('🌌 Northern Lights (no bars) — 1920×1080 — OBS Ready');
        })();
    </script>
</body>
</html>
